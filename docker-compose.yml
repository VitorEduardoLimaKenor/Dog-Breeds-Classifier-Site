services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4004:4004"
    environment:
      - TF_USE_LEGACY_KERAS=1
      - TF_ENABLE_ONEDNN_OPTS=0
      - API_KEY=${API_KEY}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
